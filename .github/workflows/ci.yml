name: CI
on: [push, pull_request]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: python:3.14-trixie

    env:
      node-version: '20'
      bun-version: '1.3.14'
      DJANGO_SETTINGS_MODULE: temba.settings_dev

    services:
      valkey:
        image: valkey/valkey:8.1-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: temba
          POSTGRES_USER: temba
          POSTGRES_PASSWORD: temba
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      localstack:
        image: localstack/localstack:4.14
        env:
          SERVICES: s3,dynamodb
        ports:
          - 4566:4566

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Linux packages
        run: |
          apt update
          apt install -y --no-install-recommends libgdal-dev ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.bun-version }}

      - name: Initialize environment
        run: |
          uv venv
          uv sync --frozen
          bun install --frozen-lockfile
          npm install -g less
          uv run python manage.py migrate
          uv run python manage.py migrate_dynamo --testing
          uv run python manage.py create_buckets --testing

      - name: Run pre-test checks
        run: |
          # test that everything is well formatted, no missing migrations etc
          uv run python code_check.py --debug
          # check we can collect and compress all static files
          uv run python manage.py collectstatic --noinput --verbosity=0
          uv run python manage.py compress --extension=".html" --settings=temba.settings_compress

      - name: Run tests
        run: uv run coverage run manage.py test --keepdb --noinput --verbosity=2

      - name: Coverage report
        run: uv run coverage report -m --fail-under=100
