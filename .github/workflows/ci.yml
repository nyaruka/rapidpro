name: CI
on: [push, pull_request]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: python:3.12-trixie

    env:
      node-version: '20'
      mailroom-version: '26.1.69'

    services:
      valkey:
        image: valkey/valkey:8.1-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: temba
          POSTGRES_USER: temba
          POSTGRES_PASSWORD: temba
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      localstack:
        image: localstack/localstack:4.14
        env:
          SERVICES: s3,dynamodb
        ports:
          - 4566:4566

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Linux packages
        run: |
          apt update
          apt install -y --no-install-recommends libgdal-dev ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Initialize environment
        run: |
          uv sync --frozen
          corepack enable
          yarn install
          yarn global add less
          cd temba && ln -s settings.py.dev settings.py && cd ..
          uv run python manage.py migrate
          uv run python manage.py migrate_dynamo --testing
          uv run python manage.py create_buckets --testing
          # fetch, extract and start mailroom
          wget https://github.com/${{ github.repository_owner }}/mailroom/releases/download/v${{ env.mailroom-version }}/mailroom_${{ env.mailroom-version }}_linux_amd64.tar.gz
          tar -xvf mailroom_${{ env.mailroom-version }}_linux_amd64.tar.gz mailroom
          # start mailroom but use different valkey db so that it doesn't actually handle tasks
          ./mailroom -db=postgres://temba:temba@postgres:5432/temba?sslmode=disable -valkey=valkey://valkey:6379/15 -log-level=info > mailroom.log &

      - name: Run pre-test checks
        run: |
          # test that everything is well formatted, no missing migrations etc
          uv run python code_check.py --debug
          # check we can collect and compress all static files
          uv run python manage.py collectstatic --noinput --verbosity=0
          uv run python manage.py compress --extension=".html" --settings=temba.settings_compress

      - name: Run tests
        run: |
          uv run coverage run manage.py test --keepdb --noinput --verbosity=2
          uv run coverage report -i
          uv run coverage xml
          uv run coverage html

      - name: Save coverage report as artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: htmlcov/

      - name: Mailroom log
        if: failure()
        run: cat mailroom.log

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
