{% comment %}
  Menu dispatch for pages whose content menu lives in a temba-page-header
  (the preview-mode chat + cards pages). Same contract and function names
  as spa_page_menu.html, so handlers written against either work.
{% endcomment %}
<script type="text/javascript">
  function handleContentMenuSelected(event) {
    var item = event.detail.item;
    var click = event.detail.event;
    if (item.type === 'link') {
      if (click) {
        click.preventDefault();
        click.stopPropagation();
        if (click.metaKey && item.url) {
          window.open(item.url, '_blank');
          return;
        }
      }
      spaGet(item.url);
    } else if (item.type === 'modax') {
      showModax(item.title, item.url, {
        disabled: item.disabled,
        onSubmit: item.on_submit,
        onRedirect: item.on_redirect,
        id: item.modal_id,
        originX: event.detail.originX,
        originY: event.detail.originY
      });
    } else if (item.type === 'url_post') {
      posterize(item.url);
    } else if (item.type === 'js') {
      if (window[item.id]) {
        window[item.id]();
      }
    }

    // items need to be refreshed in the top left sidebar menu
    refreshMenu();
  }

  function refreshMenu() {
    var menu = document.querySelector("temba-menu");
    if (menu) {
      menu.refresh();
    }
  }
</script>
