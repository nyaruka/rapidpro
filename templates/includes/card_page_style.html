{% comment %}
  Shared chrome for the preview-mode chat + cards pages (contact read,
  tickets): the white header bar with its full-bleed rule, contact-name
  sizing to match the list page titles, and no frame footer (non-preview
  pages keep it).
{% endcomment %}
<style type="text/css">
  .spa-footer {
    display: none;
  }

  /* A header strip. Pages can use several side by side (e.g. one over a
     list column, one over the chat) — the fixed height and shared surface
     make them read as one continuous control. */
  .read-header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    height: 52px;
    box-sizing: border-box;
    padding: 0 8px;
    background: var(--surface);
  }

  .read-header>* {
    flex-grow: 1;
    min-width: 0;
  }

  .read-header temba-contact-name-fetch {
    --contact-name-font-size: 15.5px;
  }

  .header-rule {
    flex: 0 0 auto;
    height: 1px;
    background: var(--border);
  }
</style>
